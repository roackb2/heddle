name: PR checks

on:
  pull_request:
    branches:
      - main

jobs:
  quality:
    name: eslint, typecheck, test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run eslint
        run: yarn eslint

      - name: Run typecheck
        run: yarn typecheck

      - name: Run tests
        run: yarn test
